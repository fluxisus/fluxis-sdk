[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fluxis"
version = "0.1.0"
description = "Official Python SDK for the Fluxis crypto payment processing API"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Fluxis", email = "dev@fluxis.us" }]
keywords = ["fluxis", "crypto", "payments", "naspip", "sdk", "blockchain"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "mypy>=1.11",
    "ruff>=0.6",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fluxis"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
