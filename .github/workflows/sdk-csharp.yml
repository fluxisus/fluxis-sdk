name: SDK — C#

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk-csharp/**'
      - 'spec/**'
  pull_request:
    paths:
      - 'packages/sdk-csharp/**'
      - 'spec/**'

defaults:
  run:
    working-directory: packages/sdk-csharp

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build
        env:
          FLUXIS_API_KEY: ${{ secrets.FLUXIS_API_KEY }}
          FLUXIS_API_SECRET: ${{ secrets.FLUXIS_API_SECRET }}
