name: SDK — TypeScript

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk/**'
      - 'spec/**'
  pull_request:
    paths:
      - 'packages/sdk/**'
      - 'spec/**'

defaults:
  run:
    working-directory: packages/sdk

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          FLUXIS_API_KEY: ${{ secrets.FLUXIS_API_KEY }}
          FLUXIS_API_SECRET: ${{ secrets.FLUXIS_API_SECRET }}
