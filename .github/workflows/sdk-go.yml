name: SDK — Go

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk-go/**'
      - 'spec/**'
  pull_request:
    paths:
      - 'packages/sdk-go/**'
      - 'spec/**'

defaults:
  run:
    working-directory: packages/sdk-go

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v
        env:
          FLUXIS_API_KEY: ${{ secrets.FLUXIS_API_KEY }}
          FLUXIS_API_SECRET: ${{ secrets.FLUXIS_API_SECRET }}
