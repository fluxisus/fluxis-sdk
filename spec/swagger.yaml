        in: header
        name: x-fluxis-api-key
        required: true
        type: string
      - description: 'Number of transactions to return (default: 50, max: 100)'
        example: 50
        in: query
        name: limit
        type: integer
      - description: 'Number of transactions to skip (default: 0)'
        example: 0
        in: query
        name: offset
        type: integer
      - description: Filter by transaction status (pending, processing, completed,
          failed)
        example: completed
        in: query
        name: status
        type: string
      - description: Filter by account ID (only for organization-level API keys)
        example: 123e4567-e89b-12d3-a456-426614174000
        in: query
        name: accountID
        type: string
      - description: 'Sort field: created_at or updated_at (default: created_at)'
        example: created_at
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc or desc (default: desc)'
        example: desc
        in: query
        name: order
